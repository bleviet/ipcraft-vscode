      - Customizing Generated Files with Scaffold Packs: how-to/customizing-generated-files-with-scaffold-packs.md
      - Building a Project: how-to/building-a-project.md
      - Checking Consistency: how-to/check-consistency.md
      - Building a VSIX Package: how-to/build-vsix.md
      - Using the Data Inspector: how-to/use-data-inspector.md
      - Using Arithmetic Functions in Port Widths: how-to/using-arithmetic-functions-in-port-widths.md
