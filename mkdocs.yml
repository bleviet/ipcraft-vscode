site_name: IPCraft for VS Code
site_description: Visual editor for FPGA IP Core and Memory Map specifications
site_url: https://bleviet.github.io/ipcraft-vscode
site_author: Le Viet Bach
repo_url: https://github.com/bleviet/ipcraft-vscode
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Le Viet Bach

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.tabs
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - tables
  - attr_list
  - toc:
      permalink: true

