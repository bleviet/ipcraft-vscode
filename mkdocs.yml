site_name: IPCraft for VS Code
site_description: Visual editor for FPGA IP Core and Memory Map specifications
site_url: https://bleviet.github.io/ipcraft-vscode
site_author: Le Viet Bach
repo_url: https://github.com/bleviet/ipcraft-vscode
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Le Viet Bach

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.tabs
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started/quickstart.md
      - Development Setup: getting-started/development.md
  - How-to Guides:
      - Importing from VHDL: how-to/vhdl-import.md
      - Generating a Project: how-to/generating-a-project.md
      - AI Design Guide: how-to/ai-design-guide.md
  - Concepts:
      - VS Code Extension Model: concepts/extension-model.md
      - YAML Data Flow: concepts/yaml-data-flow.md
      - Spatial Editing: concepts/spatial-editing.md
      - Responsive Design: concepts/responsive-design.md
  - Architecture:
      - Overview: architecture/overview.md
      - Extension Host: architecture/extension-host.md
      - Webview (React): architecture/webview.md
  - Reference:
      - Specification Schemas: reference/specification-schemas.md
      - Bit Field Interaction: reference/bitfield-interaction.md
      - Keyboard Shortcuts: reference/keyboard-shortcuts.md
      - Generator: reference/generator.md
      - IP Core Editor: reference/ip-core-editor.md
      - YAML Libraries: reference/yaml-libraries.md
  - Contributing:
      - Guidelines: contributing/guidelines.md
  - Blog:
      - Building IPCraft: blog/building-ipcraft.md
