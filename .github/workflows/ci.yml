name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package-extension:
    name: Package production VSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Package release artifact
        run: |
          mkdir -p artifacts
          npx vsce package --out artifacts/ipcraft-vscode.vsix

      - name: Verify release artifact contents and size
        run: npm run check:vsix -- artifacts/ipcraft-vscode.vsix

      - name: Upload checked release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipcraft-vscode-vsix
          path: artifacts/ipcraft-vscode.vsix
          if-no-files-found: error
          retention-days: 14

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check local Markdown links
        run: npm run docs:links

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run compile && npm run compile-tests

      - name: Verify CLI distribution contract
        run: npm run check:cli-distribution

      - name: Test clean CLI package installation
        run: npm run test:cli-package

      - name: Unit tests
        run: npm run test:unit -- --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  browser-tests:
    name: Browser tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build browser assets
        run: npm run compile

      - name: Install Chromium with Linux dependencies
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium
        if: runner.os != 'Linux'
        run: npx playwright install chromium

      - name: Run browser tests with parallel workers
        run: npm run test:browser

      - name: Upload browser test failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-test-results-${{ matrix.os }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  extension-smoke:
    name: Extension smoke (${{ matrix.name }})
    needs: package-extension
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: minimum VS Code 1.80.0
            vscode-version: 1.80.0
          - name: stable VS Code
            vscode-version: stable
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Download checked release artifact
        uses: actions/download-artifact@v4
        with:
          name: ipcraft-vscode-vsix
          path: artifacts

      - name: Verify VS Code compatibility contract
        run: npm run check:vscode-compatibility

      - name: Build E2E tests
        run: npm run compile-tests

      - name: Install release artifact and run extension smoke tests
        env:
          VSCODE_TEST_VERSION: ${{ matrix.vscode-version }}
          VSIX_PATH: artifacts/ipcraft-vscode.vsix
        run: xvfb-run -a npm run test:e2e

  hdl-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install open-source HDL tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ghdl iverilog verilator libxml2-utils

      - run: npm ci

      # Webpack copies resources/bus_definitions into dist/, which the
      # fixture generator loads at runtime.
      - name: Build
        run: npm run compile

      - name: Snapshot tests (Tier 0)
        run: npx jest --config config/jest.integration.js --testPathPatterns=snapshots

      - name: Round-trip tests (Tier 0)
        run: npx jest --config config/jest.integration.js --testPathPatterns=roundtrip

      - name: Parser round-trip tests (Tier 0)
        run: npx jest --config config/jest.integration.js --testPathPatterns=parser-roundtrip

      - name: Pack conformance kit
        run: npm run test:integration:conformance

      - name: HDL integration tests (GHDL, Icarus, Verilator)
        run: npm run test:integration:hdl

      - name: IP-XACT / SPIRIT structural validation (xmllint)
        run: npm run test:integration:ipxact
