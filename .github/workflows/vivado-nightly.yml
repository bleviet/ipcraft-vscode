name: Nightly integration

on:
  schedule:
    # 02:00 UTC every night
    - cron: '0 2 * * *'
  workflow_dispatch:

# Only one nightly run at a time; cancel the in-progress one if a manual
# dispatch is triggered while a scheduled run is already underway.
concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  integration-full:
    name: Full integration suite (Tier 0 + Tier 1)
    runs-on: ubuntu-latest

    env:
      # Write a skip record for every tool that is absent on this host so
      # dashboards can distinguish "not tested" from "tested and passed".
      SKIP_TELEMETRY_FILE: ${{ github.workspace }}/skip-telemetry.ndjson

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install open-source HDL and XML tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ghdl iverilog verilator libxml2-utils

      - run: npm ci

      - name: Build
        run: npm run compile

      # Tier 0 — pure Node, no tools needed
      - name: Snapshot tests
        run: npx jest --config config/jest.integration.js --testPathPatterns=snapshots

      - name: Round-trip tests (component.xml + hw.tcl)
        run: npx jest --config config/jest.integration.js --testPathPatterns=roundtrip

      - name: Pack conformance kit
        run: npm run test:integration:conformance

      # Tier 1 — open-source tools (installed above)
      - name: HDL integration (GHDL / Icarus / Verilator)
        run: npm run test:integration:hdl

      - name: IP-XACT / SPIRIT structural validation (xmllint)
        run: npm run test:integration:ipxact

      # Vivado and Quartus are not available on ubuntu-latest.
      # guardTier2 lets them skip with a warning and records the skip in
      # SKIP_TELEMETRY_FILE so the dashboard shows coverage gaps.

      - name: Upload skip telemetry
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skip-telemetry-${{ github.run_id }}
          path: skip-telemetry.ndjson
          retention-days: 90
          if-no-files-found: ignore
