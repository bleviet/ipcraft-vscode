<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand-grad" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF512F"/>
      <stop offset="1" stop-color="#DD2476"/>
    </linearGradient>
  </defs>

  <!-- External Ports and Bus Interfaces -->
  <!-- Left Ports -->
  <rect x="12" y="34" width="16" height="8" rx="4" fill="url(#brand-grad)" />
  <rect x="10" y="52" width="18" height="24" rx="4" fill="url(#brand-grad)" />
  
  <!-- Right Ports -->
  <rect x="100" y="52" width="18" height="24" rx="4" fill="url(#brand-grad)" />
  <rect x="100" y="86" width="16" height="8" rx="4" fill="url(#brand-grad)" />

  <!-- Main Solid IP Core Block -->
  <rect x="22" y="22" width="84" height="84" rx="16" fill="url(#brand-grad)" />

  <!-- Internal Memory Map Registers -->
  <!-- Register 1 (Top) -->
  <rect x="36" y="38" width="56" height="10" rx="3" fill="#FFFFFF" fill-opacity="0.25" />
  <line x1="52" y1="38" x2="52" y2="48" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="1.5" />
  <line x1="72" y1="38" x2="72" y2="48" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="1.5" />

  <!-- Register 2 (Middle - Active/Focused) -->
  <rect x="36" y="56" width="56" height="16" rx="3" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-width="2" />
  <!-- Active Bitfield -->
  <rect x="37" y="57" width="20" height="14" rx="2" fill="#FFFFFF" />
  <!-- Divider -->
  <line x1="75" y1="57" x2="75" y2="71" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1.5" />

  <!-- Register 3 (Bottom) -->
  <rect x="36" y="80" width="56" height="10" rx="3" fill="#FFFFFF" fill-opacity="0.25" />
  <line x1="64" y1="80" x2="64" y2="90" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="1.5" />
</svg>
