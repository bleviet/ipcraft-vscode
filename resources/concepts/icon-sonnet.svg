<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ipcraft-grad" x1="8" y1="8" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF512F"/>
      <stop offset="1" stop-color="#DD2476"/>
    </linearGradient>
    <clipPath id="ipcraft-core-clip">
      <rect x="32" y="32" width="64" height="64" rx="12"/>
    </clipPath>
  </defs>

  <!-- Ports: bus interfaces (left/right, padded) -->
  <g stroke="url(#ipcraft-grad)" stroke-width="8" stroke-linecap="round">
    <line x1="16" y1="48" x2="32" y2="48"/>
    <line x1="16" y1="80" x2="32" y2="80"/>
    <line x1="112" y1="48" x2="96" y2="48"/>
    <line x1="112" y1="80" x2="96" y2="80"/>
    <!-- Ports: single-signal (top/bottom) -->
    <line x1="64" y1="16" x2="64" y2="32"/>
    <line x1="64" y1="112" x2="64" y2="96"/>
  </g>

  <!-- IP core block -->
  <rect x="32" y="32" width="64" height="64" rx="12" fill="url(#ipcraft-grad)" fill-opacity="0.07" stroke="url(#ipcraft-grad)" stroke-width="8"/>

  <!-- Connection pads -->
  <g fill="url(#ipcraft-grad)">
    <circle cx="16" cy="48" r="6"/>
    <circle cx="16" cy="80" r="6"/>
    <circle cx="112" cy="48" r="6"/>
    <circle cx="112" cy="80" r="6"/>
    <circle cx="64" cy="16" r="4"/>
    <circle cx="64" cy="112" r="4"/>
  </g>

  <!-- Register / bitfield map (secondary read) -->
  <g clip-path="url(#ipcraft-core-clip)">
    <g fill="url(#ipcraft-grad)" fill-opacity="0.18">
      <rect x="46" y="53" width="9" height="9" rx="2"/>
      <rect x="72" y="53" width="9" height="9" rx="2"/>
      <rect x="46" y="66" width="9" height="9" rx="2"/>
      <rect x="59" y="66" width="9" height="9" rx="2"/>
      <rect x="72" y="66" width="9" height="9" rx="2"/>
    </g>
    <rect x="59" y="53" width="9" height="9" rx="2" fill="url(#ipcraft-grad)"/>
  </g>
</svg>
