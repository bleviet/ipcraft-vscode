apiVersion: '1.0'
vlnv:
  vendor: test.com
  library: unit
  name: sample_core
  version: 1.0.0
description: A sample IP core for unit testing the generator
clocks:
- name: clk
  direction: in
resets:
- name: rst
  direction: in
  polarity: activeHigh
busInterfaces:
- name: S_AXI
  type: AXI4L
  mode: slave
  physicalPrefix: s_axi_
  associatedClock: clk
  associatedReset: rst
  memoryMapRef: MAP
memoryMaps:
  import: sample-memmap.yml
parameters:
- name: ADDR_WIDTH
  value: 32
  dataType: integer
- name: DATA_WIDTH
  value: 32
  dataType: integer
