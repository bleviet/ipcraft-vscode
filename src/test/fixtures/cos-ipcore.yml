apiVersion: '1.0'
vlnv:
  vendor: test.com
  library: unit
  name: cos_core
  version: 1.0.0
description: IP core fixture for monitorChangeOf / change-of-state W1C tests
clocks:
- name: clk
  direction: in
resets:
- name: rst
  direction: in
  polarity: activeHigh
busInterfaces:
- name: S_AXI
  type: AXI4L
  mode: slave
  physicalPrefix: s_axi_
  associatedClock: clk
  associatedReset: rst
  memoryMapRef: SENSOR_MAP
memoryMaps:
  import: cos-memmap.yml
