vlnv:
  vendor: ipcraft
  library: test
  name: mixed_and_multibit
  version: 1.0.0
apiVersion: '1.0'
scaffold_pack: builtin-ipcraft
description: >
  Regression fixture for ipcraft-vscode#31 (multi-bit W1C/SC/CoS fields must
  compile on Icarus Verilog) and ipcraft-vscode#32 (a hardware-driven RO field
  mixed into an otherwise SW-writable register, without monitorChangeOf).
targets: []
clocks:
  - name: clk
    logicalName: CLK
    direction: in
    associatedReset: reset_n
resets:
  - name: reset_n
    logicalName: RESET_N
    direction: in
    polarity: activeLow
    associatedClock: clk
busInterfaces:
  - name: S_AXI_LITE
    type: ipcraft:busif:axi4_lite:1.0
    mode: slave
    physicalPrefix: s_axil_
    associatedClock: clk
    associatedReset: reset_n
    memoryMapRef: CSR_MAP
    portWidthOverrides:
      AWADDR: 8
      ARADDR: 8
      WDATA: 32
      RDATA: 32
      WSTRB: 4
memoryMaps:
  import: mixed_and_multibit.mm.yml
