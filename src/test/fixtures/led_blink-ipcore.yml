# Minimal 1 Hz LED-blink IP core, used by BoardProjectScaffolder tests to exercise the
# board-flow generator against a real, bus-less, clock+reset+single-output design.
vlnv:
  vendor: de10-nano-demo
  library: examples
  name: led_blink
  version: 1.0.0
apiVersion: '1.0'
description: Minimal 1 Hz LED blinker for the Terasic DE10-Nano.
scaffold_pack: builtin-minimal
targets:
  - quartus

clocks:
  - name: clk
    logicalName: CLK
    direction: in
    frequency: 50MHz
    description: FPGA_CLK1_50 board oscillator (PIN_V11)
    associatedReset: rst_n

resets:
  - name: rst_n
    logicalName: RESET
    direction: in
    polarity: activeLow
    description: Active-low asynchronous reset (KEY[0], PIN_AH17)
    associatedClock: clk

ports:
  - name: led
    direction: out
    width: 1
    description: User LED, active-high on the DE10-Nano (LED[0], PIN_W15)

parameters:
  - name: CLK_FREQ_HZ
    dataType: natural
    value: 50000000
    description: Input clock frequency in Hz
  - name: BLINK_HZ
    dataType: natural
    value: 1
    description: Target LED blink frequency in Hz

fileSets:
  - name: RTL_Sources
    description: RTL Sources (hand-authored)
    files:
      - path: ../../common/rtl/led_blink.sv
        type: systemverilog
        managed: false
