# Width-8 LED-bus IP core, used by BoardProjectScaffolder tests to exercise the
# board-flow generator's multi-bit port -> multi-pin mapping (one board io per bit).
vlnv:
  vendor: de10-nano-demo
  library: examples
  name: led8
  version: 1.0.0
apiVersion: '1.0'
description: 8-bit LED bus for the Terasic DE10-Nano.
scaffold_pack: builtin-minimal
targets:
  - quartus

clocks:
  - name: clk
    logicalName: CLK
    direction: in
    frequency: 50MHz
    description: FPGA_CLK1_50 board oscillator (PIN_V11)
    associatedReset: rst_n

resets:
  - name: rst_n
    logicalName: RESET
    direction: in
    polarity: activeLow
    description: Active-low asynchronous reset (KEY[0], PIN_AH17)
    associatedClock: clk

ports:
  - name: led
    direction: out
    width: 8
    description: 8 user LEDs (LED[7:0])

fileSets:
  - name: RTL_Sources
    description: RTL Sources (hand-authored)
    files:
      - path: ../../common/rtl/led8.sv
        type: systemverilog
        managed: false
