- name: MAP
  description: Sample Memory Map
  addressBlocks:
  - name: REGS
    baseAddress: 0
    usage: register
    registers:
    - name: CTRL
      description: Control Register
      fields:
      - name: ENABLE
        bits: '[0:0]'
        access: read-write
      - name: RESET
        bits: '[1:1]'
        access: write-only
    - name: STATUS
      description: Status Register
      offset: 4
      fields:
      - name: READY
        bits: '[0:0]'
        access: read-only
  - name: RAM
    baseAddress: 1024
    usage: memory
    range: 1024
    access: read-write
